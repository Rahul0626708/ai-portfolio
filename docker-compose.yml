version: "3.8"
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend-python:
    build: ./backend-python
    ports:
      - "8000:8000"
    environment:
      DB_PASSWORD: yourpassword
    depends_on:
      - postgres
    extra_hosts:
      - "host.docker.internal:host-gateway"

  backend-java:
    build: ./backend-java/api
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/portfolio
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: yourpassword
    depends_on:
      - postgres

  backend-node:
    build: ./backend-node
    ports:
      - "4000:4000"
    depends_on:
      - backend-python
      - backend-java

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend-node

volumes:
  pgdata:
